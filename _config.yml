###########################################################
### Welcome to Beautiful Jekyll!
###########################################################

############################
# --- Required options --- #
############################

title: 叁
author: 叁

###############################################
# --- List of links in the navigation bar --- #
###############################################

navbar-links:
  博客: "/"
  About: "about"
  Games: "Games"

################
# --- Logo --- #
################

avatar: "https://pic4.zhimg.com/v2-3e65b35673b824aff8197d9ce3fed0ed_r.jpg"
round-avatar: true

#####################################
# --- Footer social media links --- #
#####################################

social-network-links:
  rss: true

###########################
# --- General options --- #
###########################

url: "https://AneSan333.github.io"
baseurl: ""

share-links-active:
  twitter: true
  facebook: true
  linkedin: true
  vk: false
  reddit: false

url-pretty: "AneSan333.github.io"
title-on-all-pages: true
excerpt_length: 50
feed_show_excerpt: true
feed_show_tags: true
post_search: true
edit_page_button: true
navbar-var-length: false

rss-description: 我的技术、技能学习记录（持续更新版）

######################################
# --- Colours / background image --- #
######################################

page-col: "#FFFFFF"
text-col: "#404040"
link-col: "#008AFF"
hover-col: "#0085A1"
navbar-col: "#EAEAEA"
navbar-text-col: "#404040"
navbar-border-col: "#DDDDDD"
footer-col: "#EAEAEA"
footer-text-col: "#777777"
footer-link-col: "#404040"
footer-hover-col: "#0085A1"

################
# --- Misc --- #
################

date_format: "%B %-d, %Y"
excerpt_separator: "<!--more-->"

collections:
  Games:
    output: true
    permalink: /Games/:title/

#################################################################################
# --- You don't need to touch anything below here (but you can if you want) --- #
#################################################################################

remote_theme: daattali/beautiful-jekyll@6.0.1

timezone: "Asia/Shanghai"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      social-share: true
  -
    scope:
      path: ""
      type: "Games"
    values:
      layout: "page"
  -
    scope:
      path: ""
    values:
      layout: "page"

exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
  - docs/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-remote-theme
